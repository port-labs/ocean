title: Cursor
description: Cursor integration for Port Ocean
icon: Cursor
formMappingEnabled: true
recommendedInstallationMethod: Saas
features:
  - type: exporter
    section: AI Agents
    resources:
      - kind: cursor-team-model-usage
      - kind: cursor-user-model-usage
      - kind: cursor-daily-usage
      - kind: cursor-usage-event
saas:
  enabled: true
configurations:
  - name: cursorApiKey
    type: string
    required: true
    sensitive: true
    description: Cursor API key used for both analytics and team usage endpoints.
  - name: cursorApiHost
    required: false
    type: url
    default: https://api.cursor.com
    description: Base URL of the Cursor API.
  - name: cursorPageSize
    required: false
    type: integer
    default: 500
    description: Number of records fetched per page for paginated Cursor endpoints. Lower values reduce per-request load and tighten error scoping; higher values reduce sync duration.
