title: AWS Hosted by Port
description: AWS integration for Port Ocean Hosted by Port
icon: AWS
docs: https://docs.port.io/build-your-software-catalog/sync-data-to-catalog/cloud-providers/aws-v3
features:
  - type: exporter
    section: Cloud Providers
    resources:
      - kind: AWS::Account::Info
      - kind: AWS::S3::Bucket
      - kind: AWS::EC2::Instance
      - kind: AWS::ECS::Cluster
      - kind: AWS::ECS::TaskDefinition
      - kind: AWS::ECR::Repository
      - kind: AWS::EC2::Volume
configurations:
  - name: credentialProviderPriority
    required: false
    type: string
    sensitive: false
    default: "AssumeRoleWithWebIdentity,StaticCredential,AssumeRole"
    description: The priority of the credential providers. The providers will be tried in the order of the priority. The first provider that is applicable will be used. The default value is "AssumeRoleWithWebIdentity,StaticCredential,AssumeRole".
  - name: ouId
    required: false
    type: string
    sensitive: false
    description: AWS Organization Unit (OU) ID to discover active accounts from. When provided, the integration will only attempt to use discover active accounts from the specified OU.
  - name: accountRoleArn
    required: false
    type: string
    sensitive: false
    description: AWS Account Role ARN for organizations access. When provided, the integration will attempt to use AWS Organizations to discover accounts, falling back to single account mode if organizations is not available.
  - name: accountRoleArns
    required: false
    type: array
    sensitive: false
    description: Array of AWS Account Role ARNs for direct multi-account access. Use this when you don't have AWS Organizations enabled or want to specify exact accounts to access.
  - name: externalId
    required: false
    type: string
    sensitive: false
    description: The external ID used for the AWS Account Read Role used in assume role.
  - name: aws_access_key_id
    required: false
    type: string
    sensitive: true
    description: AWS Access Key ID for static credential authentication (optional).
  - name: aws_secret_access_key
    required: false
    type: string
    sensitive: true
    description: AWS Secret Access Key for static credential authentication (optional).
  - name: aws_session_token
    required: false
    type: string
    sensitive: true
    description: AWS Session Token for temporary static credentials (optional).
  - name: webhookSecret
    required: false
    type: string
    sensitive: true
    description: >
      Shared secret for HMAC-SHA256 verification of inbound live-event payloads.
      When set, every webhook must carry an `X-Port-Signature` header computed
      over the raw body. When unset, only the SNS X.509 signature is enforced.
      Note: the standard EventBridge → SNS → HTTPS path cannot inject custom
      HTTP headers. This option requires an API Gateway or equivalent component
      in front of the webhook endpoint to compute and inject the header.
  - name: liveEventsEnabled
    required: false
    type: boolean
    sensitive: false
    default: true
    description: Kill-switch for the live-events webhook path. False leaves the endpoint registered but short-circuits every event with a warning log. Useful for self-hosted deployments that prefer pure resync.
  - name: snsCertHostAllowlist
    required: false
    type: string
    sensitive: false
    default: "amazonaws.com"
    description: Comma-separated host suffixes whose SNS signing certs are trusted. The verifier also pins the `sns.` prefix on top of this. Default covers every commercial AWS region (`sns.<region>.amazonaws.com`); tighten (e.g. `us-east-1.amazonaws.com`) if the topic only lives in specific regions.
disableDefaultInstallationMethods: true
installationDocs:
  saas:
    - name: Saas
      enabled: true
      docs: build-your-software-catalog/sync-data-to-catalog/cloud-providers/aws-v3/installations?installation-method=single-account#installation-methods
saas:
  enabled: true
  liveEvents:
    enabled: true
