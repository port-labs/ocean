AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Port Ocean AWS-V3 — AWS Organizations service-managed StackSet for live events.
  Deploy from the management account (or a delegated CloudFormation admin) after
  enabling Organizations trusted access for CloudFormation StackSets. Registers
  the StackSet and child-template URL for live-events.yaml.

# =============================================================================
# CHOOSE HOW REGIONS ARE SET
# =============================================================================
#
# StackInstancesProvisioning selects one path:
#
#   DEFER — Parent stack creates the StackSet only. Add stack instances in the
#           CloudFormation console: Stack sets → your set → “Set deployment
#           options” → “Add stacks to stack set” → pick OUs/account scope AND
#           select Regions in the Stack Set region picker (no region list below).
#
#   INLINE_PARAMETERS — Deploy stack instances from this stack at the same time.
#           Set TargetOrganizationalUnitIds + StackInstanceRegions (comma-separated
#           IDs in each parameter field on CloudFormation deploy, or CLI
#           --parameter-overrides). One member stack per OU coverage × Region.
#
# =============================================================================
# PREREQUISITES
# =============================================================================
#
# 1. Upload live-events.yaml to an S3 bucket in this partition and grant the
#    CloudFormation StackSet service read access (HTTPS URL passed as parameter).
#
# 2. AWS Organizations trusted access for CloudFormation StackSets enabled.
#
# 3. In every member account × Region where stack instances eventually run,
#    create Secrets Manager secret WebhookSecretName matching Ocean webhookSecret.
#
# 4. Include us-east-1 in your chosen Regions if you want S3 bucket live events
#    (S3 CT-on-EB is modeled there only).
#
# =============================================================================
# DEPLOY EXAMPLES (management account)
# =============================================================================
#
# A — Console region picker after stack succeeds (Provisioning=DEFER, default):
#
#     aws cloudformation deploy ... --parameter-overrides \
#             LiveEventsTemplateURL=... \
#             OceanWebhookUrl=... WebhookSecretName=...
#
#     Then Console → Stack sets → Add stacks → pick regions in the UI.
#
# B — Inline OU + Regions at deploy (Provisioning=INLINE_PARAMETERS):
#
#     aws cloudformation deploy ... \
#         --parameter-overrides \
#             StackInstancesProvisioning=INLINE_PARAMETERS \
#             TargetOrganizationalUnitIds='ou-xxxx,r-yyyy' \
#             StackInstanceRegions='us-east-1,eu-west-1' \
#             LiveEventsTemplateURL=...
#
# CLI after DEFER — create-stack-instances:
#
#     aws cloudformation create-stack-instances \
#         --stack-set-name port-ocean-aws-live-events \
#         --deployment-targets OrganizationalUnitIds=ou-xxxx,r-yyyy \
#         --regions us-east-1 us-west-2
#
# =============================================================================


Parameters:

  StackInstancesProvisioning:
    Type: String
    Default: DEFER
    AllowedValues:
      - DEFER
      - INLINE_PARAMETERS
    Description: >-
      DEFER: create StackSet only; choose OUs and Regions in Stack Sets console (
      region picker ). INLINE_PARAMETERS: also deploy instances using OU + region
      parameters below.

  TargetOrganizationalUnitIds:
    Type: String
    Default: ''
    Description: >-
      Required when StackInstancesProvisioning=INLINE_PARAMETERS — comma-separated
      OU IDs and/or organization root r-xxxx (no spaces around commas). Ignored when DEFER.

  StackInstanceRegions:
    Type: String
    Default: ''
    Description: >-
      Required when StackInstancesProvisioning=INLINE_PARAMETERS — comma-separated
      AWS Regions (no spaces around commas). Ignored when DEFER.

  LiveEventsTemplateURL:
    Type: String
    AllowedPattern: ^https://.*
    Description: >-
      HTTPS URL (typically S3) to live-events.yaml — max 1 MB template body.

  StackSetName:
    Type: String
    Default: port-ocean-aws-live-events
    Description: >-
      StackSet name (unique per Region where this parent stack runs).
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9\-]{0,127}$
    ConstraintDescription: >-
      Alphanumeric and hyphens; 1–128 chars; must begin with a letter.

  OceanWebhookUrl:
    Type: String
    Description: >-
      Full Ocean webhook URL ending in /integration/webhook/live-events.
    AllowedPattern: ^https://.+/integration/webhook/live-events$

  WebhookSecretName:
    Type: String
    Description: >-
      Secrets Manager secret name replicated in each member account (not ARN).

  ResourcePrefix:
    Type: String
    Default: port-ocean-aws-live-events
    AllowedPattern: ^[a-z0-9][a-z0-9-]{1,40}[a-z0-9]$
    Description: >-
      Passed through to live-events.yaml (resource name prefix; lowercase).

  StackSetCallAs:
    Type: String
    Default: SELF
    AllowedValues:
      - SELF
      - DELEGATED_ADMIN
    Description: >-
      SELF when deploying from the organization management account; DELEGATED_ADMIN
      when deploying from a registered delegated administrator account.

  FailureTolerancePercentage:
    Type: Number
    Default: 50
    MinValue: 0
    MaxValue: 100
    Description: >-
      Percentage of stack instances per Region that can fail before StackSet op stops.

  MaxConcurrentPercentage:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 100
    Description: >-
      Maximum percentage of stack instances per Region deployed in parallel.


Rules:

  InlineRequiresOuAndRegions:
    RuleCondition:
      Fn::Equals:
        - Ref: StackInstancesProvisioning
        - INLINE_PARAMETERS
    Assertions:
      - AssertDescription: >-
          INLINE_PARAMETERS requires non-empty TargetOrganizationalUnitIds and
          StackInstanceRegions (comma-separated, no wrapping spaces).
        Assert:
          Fn::And:
            - Fn::Not:
                - Fn::Equals:
                    - Ref: TargetOrganizationalUnitIds
                    - ''
            - Fn::Not:
                - Fn::Equals:
                    - Ref: StackInstanceRegions
                    - ''


Conditions:

  UseDelegatedAdmin:
    Fn::Equals:
      - Ref: StackSetCallAs
      - DELEGATED_ADMIN

  UseInlineProvisioning:
    Fn::Equals:
      - Ref: StackInstancesProvisioning
      - INLINE_PARAMETERS


Resources:

  LiveEventsStackSet:
    Type: AWS::CloudFormation::StackSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      StackSetName:
        Ref: StackSetName
      Description: >-
        Port Ocean AWS-V3 live events — EventBridge → Ocean webhook (member accounts).
      PermissionModel: SERVICE_MANAGED
      CallAs:
        Fn::If:
          - UseDelegatedAdmin
          - DELEGATED_ADMIN
          - SELF
      Capabilities:
        - CAPABILITY_IAM
      ManagedExecution:
        Active: true
      AutoDeployment:
        Enabled: true
        RetainStacksOnAccountRemoval: false
      OperationPreferences:
        RegionConcurrencyType: PARALLEL
        FailureTolerancePercentage:
          Ref: FailureTolerancePercentage
        MaxConcurrentPercentage:
          Ref: MaxConcurrentPercentage
      TemplateURL:
        Ref: LiveEventsTemplateURL
      Parameters:
        - ParameterKey: OceanWebhookUrl
          ParameterValue:
            Ref: OceanWebhookUrl
        - ParameterKey: WebhookSecretArn
          ParameterValue: ''
        - ParameterKey: WebhookSecretName
          ParameterValue:
            Ref: WebhookSecretName
        - ParameterKey: ResourcePrefix
          ParameterValue:
            Ref: ResourcePrefix
      StackInstancesGroup:
        Fn::If:
          - UseInlineProvisioning
          - - DeploymentTargets:
                OrganizationalUnitIds:
                  Fn::Split:
                    - ','
                    - Ref: TargetOrganizationalUnitIds
              Regions:
                Fn::Split:
                  - ','
                  - Ref: StackInstanceRegions
          - Ref: AWS::NoValue


Outputs:

  StackSetId:
    Description: Identifier of the StackSet resource.
    Value:
      Fn::GetAtt:
        - LiveEventsStackSet
        - StackSetId

  StackSetNameOutput:
    Description: >-
      Stack set name — for DEFER, use Stack sets console “Add stacks” + region picker;
      for INLINE_PARAMETERS, instances were created via this deployment.
    Value:
      Ref: StackSetName
