AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Port Ocean AWS-V3 — AWS Organizations service-managed StackSet for live events.
  Deploy from the management account (or a delegated CloudFormation admin) after
  enabling Organizations trusted access for CloudFormation StackSets. Creates one
  stack instance per (member account × Region) under the target organizational units,
  using integrations/aws-v3/docs/cloudformation/live-events.yaml as the child template.

# =============================================================================
# PREREQUISITES
# =============================================================================
#
# 1. Upload live-events.yaml to an S3 bucket in this partition and grant the
#    CloudFormation StackSet service read access (HTTPS URL passed as parameter).
#
# 2. AWS Organizations trusted access for CloudFormation StackSets enabled.
#
# 3. In every target member account (and each StackSet Region where instances run),
#    create a Secrets Manager secret whose name matches WebhookSecretName and whose
#    SecretString matches Ocean webhookSecret (same value org-wide).
#
# 4. Region coverage: StackInstanceRegionsMode=CUSTOM selects listed regions via
#    StackInstanceRegions; ALL_STANDARD_COMMERCIAL uses the RegionsCsv mapping below
#    (commercial partition IDs from docs.aws.amazon.com/general/latest/gr/rande.html —
#    update the mapping when AWS adds Regions). Stacks only deploy successfully in
#    Regions enabled for your organization.
#
# 5. Include us-east-1 in your effective region list if you want S3 bucket lifecycle
#    live events (CloudTrail-on-EventBridge is evaluated in us-east-1 only).
#
# =============================================================================
# DEPLOY (management account example)
# =============================================================================
#
#     aws cloudformation deploy \
#         --region us-east-1 \
#         --stack-name port-ocean-aws-live-events-org \
#         --template-file live-events-org-stackset.yaml \
#         --capabilities CAPABILITY_IAM \
#         --parameter-overrides \
#             LiveEventsTemplateURL=https://my-bucket.s3.amazonaws.com/live-events.yaml \
#             TargetOrganizationalUnitIds=ou-abcd-11111111,ou-abcd-22222222 \
#             StackInstanceRegionsMode=CUSTOM \
#             StackInstanceRegions=us-east-1,us-west-2,eu-west-1 \
#             OceanWebhookUrl=https://<your-ocean-host>/integration/webhook/live-events \
#             WebhookSecretName=port-ocean-aws-live-events-webhook
#
# Deploy to every commercial-partition Region in the RegionsCsv mapping (see Mappings).
#
#     StackInstanceRegionsMode=ALL_STANDARD_COMMERCIAL
#
# =============================================================================


Parameters:

  LiveEventsTemplateURL:
    Type: String
    AllowedPattern: ^https://.*
    Description: >-
      HTTPS URL (typically S3) to live-events.yaml — max 1 MB template body.

  StackSetName:
    Type: String
    Default: port-ocean-aws-live-events
    Description: >-
      StackSet name (unique per Region where this parent stack runs).
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9\-]{0,127}$
    ConstraintDescription: >-
      Alphanumeric and hyphens; 1–128 chars; must begin with a letter.

  TargetOrganizationalUnitIds:
    Type: CommaDelimitedList
    Description: >-
      Organizational unit IDs and/or organization root (r-xxxx) to deploy into.
      Example: ou-abcd-11111111,r-abcd

  StackInstanceRegionsMode:
    Type: String
    Default: CUSTOM
    AllowedValues:
      - CUSTOM
      - ALL_STANDARD_COMMERCIAL
    Description: >-
      CUSTOM: deploy only to Regions listed in StackInstanceRegions.
      ALL_STANDARD_COMMERCIAL: deploy every Region in Mapping
      RegionInventory.StandardCommercialPartition.RegionsCsv (standard commercial IDs
      from docs.aws.amazon.com/general/latest/gr/rande.html — extend when AWS launches
      Regions). Opt-in Regions must be enabled Organization-wide where required.

  StackInstanceRegions:
    Type: CommaDelimitedList
    Description: >-
      Used when StackInstanceRegionsMode is CUSTOM — stack instances every
      (member account × Region). Ignored when ALL_STANDARD_COMMERCIAL.
    Default: us-east-1

  OceanWebhookUrl:
    Type: String
    Description: >-
      Full Ocean webhook URL ending in /integration/webhook/live-events.
    AllowedPattern: ^https://.+/integration/webhook/live-events$

  WebhookSecretName:
    Type: String
    Description: >-
      Secrets Manager secret name replicated in each member account (not ARN).

  ResourcePrefix:
    Type: String
    Default: port-ocean-aws-live-events
    AllowedPattern: ^[a-z0-9][a-z0-9-]{1,40}[a-z0-9]$
    Description: >-
      Passed through to live-events.yaml (resource name prefix; lowercase).

  # StackSetCallAs:
  #   Type: String
  #   Default: SELF
  #   AllowedValues:
  #     - SELF
  #     - DELEGATED_ADMIN
  #   Description: >-
  #     SELF when deploying from the organization management account; DELEGATED_ADMIN
  #     when deploying from a registered delegated administrator account.

  FailureTolerancePercentage:
    Type: Number
    Default: 50
    MinValue: 0
    MaxValue: 100
    Description: >-
      Percentage of stack instances per Region that can fail before StackSet op stops.

  MaxConcurrentPercentage:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 100
    Description: >-
      Maximum percentage of stack instances per Region deployed in parallel.


Mappings:

  RegionInventory:
    StandardCommercialPartition:
      # AWS General Reference Regions table (commercial; excludes GovCloud/China — opt-in Regions).
      # https://docs.aws.amazon.com/general/latest/gr/rande.html — append new GA Regions here when needed.
      RegionsCsv: af-south-1,ap-east-1,ap-east-2,ap-northeast-1,ap-northeast-2,ap-northeast-3,ap-south-1,ap-south-2,ap-southeast-1,ap-southeast-2,ap-southeast-3,ap-southeast-4,ap-southeast-5,ap-southeast-6,ap-southeast-7,ca-central-1,ca-west-1,eu-central-1,eu-central-2,eu-north-1,eu-south-1,eu-south-2,eu-west-1,eu-west-2,eu-west-3,il-central-1,mx-central-1,me-central-1,me-south-1,sa-east-1,us-east-1,us-east-2,us-west-1,us-west-2


Conditions:

  UseDelegatedAdmin:
    Fn::Equals:
      - Ref: StackSetCallAs
      - DELEGATED_ADMIN

  DeployAllListedCommercialRegions:
    Fn::Equals:
      - Ref: StackInstanceRegionsMode
      - ALL_STANDARD_COMMERCIAL


Resources:

  LiveEventsStackSet:
    Type: AWS::CloudFormation::StackSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      StackSetName:
        Ref: StackSetName
      Description: >-
        Port Ocean AWS-V3 live events — EventBridge → Ocean webhook (member accounts).
      PermissionModel: SERVICE_MANAGED
      CallAs:
        Fn::If:
          - UseDelegatedAdmin
          - DELEGATED_ADMIN
          - SELF
      Capabilities:
        - CAPABILITY_IAM
      ManagedExecution:
        Active: true
      AutoDeployment:
        Enabled: true
        RetainStacksOnAccountRemoval: false
      OperationPreferences:
        RegionConcurrencyType: PARALLEL
        FailureTolerancePercentage:
          Ref: FailureTolerancePercentage
        MaxConcurrentPercentage:
          Ref: MaxConcurrentPercentage
      TemplateURL:
        Ref: LiveEventsTemplateURL
      Parameters:
        - ParameterKey: OceanWebhookUrl
          ParameterValue:
            Ref: OceanWebhookUrl
        - ParameterKey: WebhookSecretArn
          ParameterValue: ''
        - ParameterKey: WebhookSecretName
          ParameterValue:
            Ref: WebhookSecretName
        - ParameterKey: ResourcePrefix
          ParameterValue:
            Ref: ResourcePrefix
      StackInstancesGroup:
        - DeploymentTargets:
            OrganizationalUnitIds:
              Ref: TargetOrganizationalUnitIds
          Regions:
            Fn::If:
              - DeployAllListedCommercialRegions
              - Fn::Split:
                  - ','
                  - Fn::FindInMap:
                      - RegionInventory
                      - StandardCommercialPartition
                      - RegionsCsv
              - Ref: StackInstanceRegions


Outputs:

  StackSetId:
    Description: Identifier of the StackSet resource.
    Value:
      Fn::GetAtt:
        - LiveEventsStackSet
        - StackSetId
