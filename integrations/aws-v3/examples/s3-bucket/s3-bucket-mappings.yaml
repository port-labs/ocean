resources:
  - kind: AWS::S3::Bucket
    selector:
      query: 'true'
      includeActions:
        - GetBucketEncryptionAction
        - GetPublicAccessBlockAction
    port:
      entity:
        mappings:
          identifier: .Properties.BucketName
          title: .Properties.BucketName
          blueprint: '"s3Bucket"'
          properties:
            arn: .Properties.Arn
            creationDate: .Properties.CreationDate
            encryption: .Properties.BucketEncryption
            publicAccessBlockConfiguration: .Properties.PublicAccessBlockConfiguration
            tags: .Properties.Tags
