title: Cursor Cloud Agents
description: Cursor Cloud Agents integration for Port Ocean
icon: Cursor
docs: https://docs.port.io/build-your-software-catalog/sync-data-to-catalog/ai-agents/cursor-cloud-agents
recommendedInstallationMethod: Saas
formMappingEnabled: true
features:
  - type: exporter
    section: AI Agents
    resources:
      - kind: agent
      - kind: run
saas:
  enabled: true
  liveEvents:
    enabled: true
configurations:
  - name: cursorApiKey
    type: string
    required: true
    sensitive: true
    description: Cursor API key used to authenticate with the Cloud Agents API. Generate one from Cursor Dashboard -> API Keys.
  - name: webhookSigningSecret
    type: string
    required: false
    sensitive: true
    description: Optional secret used to sign and verify Cursor v0 agent status webhooks. When set, the integration derives a per-run signing secret and validates the X-Webhook-Signature header on incoming webhooks. When unset, webhook signature verification is skipped. Generate a random string (for example with openssl rand -hex 32) and store it as an organization secret during installation.
  - name: cursorApiHost
    type: url
    required: false
    sensitive: false
    default: https://api.cursor.com
    description: The host of the Cursor API. If not specified, the default will be https://api.cursor.com.
  - name: cursorConsoleHost
    type: url
    required: false
    sensitive: false
    default: https://cursor.com
    description: The host of the Cursor console, used to build agent links in action run output. If not specified, the default will be https://cursor.com.
  - name: cursorPageSize
    type: integer
    required: false
    default: 20
    description: Number of records fetched per page for paginated Cursor endpoints (max 100). Lower values reduce per-request load and tighten error scoping; higher values reduce sync duration.
actionsProcessingEnabled: true
actions:
  - name: create_agent
    icon: Cursor
    description: Launch a new Cursor cloud agent with an initial prompt. Cursor's create API always starts a run and billable work immediately - there is no config-only create. On apiVersion v1, the merged request body must include repository, config.repos, or config.env (Port policy). On apiVersion v0, Cursor requires source.repository or source.prUrl in the merged body.
    inputs:
      - name: apiVersion
        title: API version
        type: string
        description: 'Which Cursor create API to use. v0 supports optional webhook completion tracking via reportCompletion and v0 target options under config.target (branchName, openAsCursorGithubApp, skipReviewerRequest, autoBranch). v1 supports richer create-time options (mcpServers, envVars, customSubagents, env, workOnCurrentBranch, name, prompt.images, skipReviewerRequest, multi-repo) but has no webhooks - the Port run always completes after launch. Use v0 when you need to wait for agent completion in Port; use v1 for richer agent configuration.'
        default: v1
        required: true
      - name: prompt
        title: Prompt
        type: string
        description: Task instructions. Set this field or config.prompt.text (after merge). If you use config.prompt only, include text - shallow merge replaces the whole prompt object.
        required: false
      - name: repository
        title: Repository
        type: string
        description: GitHub repository URL, for example https://github.com/your-org/your-repo. On apiVersion v0, maps to Cursor source (Cursor requires repository or prUrl in the merged body). On apiVersion v1, satisfies the Port workspace requirement unless config.repos or config.env is set.
        required: false
      - name: ref
        title: Ref
        type: string
        description: Git branch name or commit SHA to use as the base branch. Ignored when prUrl is provided.
        required: false
      - name: prUrl
        title: Pull request URL
        type: string
        description: GitHub pull request URL. On apiVersion v0, can be used instead of repository. On apiVersion v1, applies when set together with repository in the mapped repos entry.
        required: false
      - name: model
        title: Model
        type: jqObject
        description: 'Optional Cursor model. Omit to use your account default. String shorthand in workflows is also accepted. Object example: {"id": "composer-2.5", "params": [{"id": "fast", "value": "false"}]}. See Cursor GET /v1/models for valid id and params combinations. config.model overrides this field when both are set.'
        required: false
      - name: autoCreatePr
        title: Auto create pull request
        type: boolean
        description: Whether to automatically create a pull request when the agent completes.
        default: false
        required: false
      - name: reportCompletion
        title: Report completion
        type: boolean
        description: 'Only applies when apiVersion is v0. When true, attaches a webhook owned by the integration and keeps the Port run IN_PROGRESS until the agent reaches a terminal status (requires Ocean to have a reachable public URL - OCEAN__BASE_URL). When true, config.webhook is rejected. When false on v0, launches without an integration webhook (you may set config.webhook yourself) and completes the Port run immediately after launch. Rejected when apiVersion is v1 (v1 has no webhooks).'
        default: false
        required: false
      - name: config
        title: Additional configuration
        type: jqObject
        description: 'Optional advanced configuration shallow-merged onto the top-level Cursor request body (nested objects and arrays replace the whole value). Use the Cursor API shape for the selected apiVersion. With apiVersion v0: target (for example {"branchName": "...", "autoCreatePr": true}), model as a model ID string, optional webhook ({url, secret}) - webhook is not allowed when reportCompletion is true. With apiVersion v1: model as an object ({id, params}), mcpServers, customSubagents, envVars, mode, env (for example {"type": "cloud", "name": "my-env"}), workOnCurrentBranch, name, prompt.images, repos, autoCreatePR, skipReviewerRequest, agentId. Reference the action trigger data with double brackets, for example: {{ .trigger.by.user.email }}.'
        required: false
  - name: trigger_agent
    icon: Cursor
    description: Send a follow-up prompt to an existing Cursor cloud agent.
    inputs:
      - name: agentId
        title: Agent ID
        type: string
        description: The ID of the agent to send the follow-up prompt to, for example bc-00000000-0000-0000-0000-000000000001
        required: true
      - name: prompt
        title: Prompt
        type: string
        description: Follow-up instructions. Set this field or config.prompt.text (after merge). If you use config.prompt only, include text.
        required: false
      - name: reportCompletion
        title: Report completion
        type: boolean
        description: 'When true, keeps the Port run IN_PROGRESS until the agent reaches a terminal status, but only if the agent was originally created via create_agent with apiVersion v0 and reportCompletion true (a webhook registered at launch time). Follow-ups always use the v1 API; v1 follow-ups on webhook-tracked agents still receive completion callbacks. When false, or when the agent has no registered webhook, completes the Port run immediately after the follow-up HTTP call succeeds.'
        default: false
        required: false
      - name: config
        title: Additional configuration
        type: jqObject
        description: 'Optional advanced configuration shallow-merged onto the top-level Cursor v1 follow-up request body: mcpServers, mode, prompt.images (under config.prompt, not at config root). Always honored regardless of how the agent was created. Reference the action trigger data with double brackets, for example: {{ .trigger.by.user.email }}.'
        required: false
