title: Azure Devops
description: Azure Devops integration for Port Ocean
icon: AzureDevops
docs: https://docs.port.io/build-your-software-catalog/sync-data-to-catalog/git/azure-devops
formMappingEnabled: true
features:
  - type: gitops
    section: GitOps
  - type: exporter
    section: Git Providers
configurations:
  - name: accountMode
    description: How to authenticate to Azure DevOps. "Single Account" uses a personal access token against one organization. "Multiple Accounts" uses an Azure AD service principal across many organizations.
    required: false
    type: string
    enum: ["Single Account", "Multiple Accounts"]
    format: "tabSwitcher"
    default: "Single Account"
  - name: organizationUrl
    description: The URL of your Azure DevOps organization (e.g., "https://dev.azure.com/{your-organization}"). To find your organization URL, refer to the <a target="_blank" href="https://learn.microsoft.com/en-us/azure/devops/extend/develop/work-with-urls?view=azure-devops&tabs=http">Azure DevOps documentation</a>.
    required: false
    type: url
    sensitive: true
    dependencies:
      - on: accountMode
        when:
          equals: "Single Account"
        then:
          required: true
  - name: personalAccessToken
    description: A personal access token (PAT) with read permissions for the resources you want to sync. To create a PAT, see the <a target="_blank" href="https://learn.microsoft.com/en-us/azure/devops/organizations/accounts/use-personal-access-tokens-to-authenticate?view=azure-devops">Azure DevOps documentation</a>.
    required: false
    type: string
    sensitive: true
    dependencies:
      - on: accountMode
        when:
          equals: "Single Account"
        then:
          required: true
  - name: clientId
    description: Azure AD application (client) ID used to authenticate across multiple Azure DevOps organizations.
    type: string
    required: false
    dependencies:
      - on: accountMode
        when:
          equals: "Multiple Accounts"
        then:
          required: true
  - name: clientSecret
    description: Azure AD application client secret.
    type: string
    required: false
    sensitive: true
    dependencies:
      - on: accountMode
        when:
          equals: "Multiple Accounts"
        then:
          required: true
  - name: tenantId
    description: Azure AD tenant ID.
    type: string
    required: false
    dependencies:
      - on: accountMode
        when:
          equals: "Multiple Accounts"
        then:
          required: true
  - name: organizationUrls
    description: List of Azure DevOps organization URLs to sync (e.g. "https://dev.azure.com/{your-organization}").
    type: array
    required: false
    dependencies:
      - on: accountMode
        when:
          equals: "Multiple Accounts"
        then:
          required: true
  - name: isProjectsLimited
    description: Set to true if the personal access token's scope is limited to specific projects within your organization.
    required: false
    type: boolean
    default: true
  - name: appHost
    required: false
    type: url
    description: The URL of the Port Ocean app. This is required for real-time event processing, ensuring Port always reflects the latest state of your Azure DevOps resources.
  - name: webhookSecret
    description: Optional secret token for securing webhook communication between Azure DevOps and Port. This ensures that only legitimate events from Azure DevOps are accepted. To learn more, see the <a target="_blank" href="https://learn.microsoft.com/en-us/azure/devops/service-hooks/services/webhooks?view=azure-devops">Azure DevOps webhook documentation</a>.
    type: string
    required: false
    sensitive: true
  - name: webhookAuthUsername
    description: The username used by Azure DevOps to authenticate webhook requests.
    type: string
    required: false
    default: port
deploymentMethodOverride:
  - type: helm
saas:
  enabled: true
  liveEvents:
    enabled: true
installationDocs:
  saas:
    - name: SaasOAuth2
      enabled: false
    - name: Saas
      enabled: false
  githubWorkflow:
    enabled: true
    docs: build-your-software-catalog/sync-data-to-catalog/git/azure-devops/?installation-methods=one-time-ci&cicd-method=github#setup
  gitlabCI:
    enabled: true
    docs: build-your-software-catalog/sync-data-to-catalog/git/azure-devops/?installation-methods=one-time-ci&cicd-method=gitlab#setup
  azurePipeline:
    enabled: true
    docs: build-your-software-catalog/sync-data-to-catalog/git/azure-devops/?installation-methods=one-time-ci&cicd-method=azure#setup
  helm:
    enabled: true
    docs: build-your-software-catalog/sync-data-to-catalog/git/azure-devops/?installation-methods=real-time-self-hosted#setup
  docker:
    enabled: false
