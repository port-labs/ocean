title: GitHub Copilot
description: github-copilot integration for Port Ocean
icon: GithubCopilot
formMappingEnabled: true
recommendedInstallationMethod: Saas
features:
  - type: exporter
    section: AI Agents
    resources:
      - kind: organization-usage-metrics
      - kind: user-usage-metrics
      - kind: organization-user-usage-metrics
      - kind: enterprise-usage-metrics
      - kind: enterprise-user-usage-metrics
saas:
  enabled: true
configurations:
  - name: githubToken
    type: string
    sensitive: true
    description: The Github token to authenticate with the Github API. Refer <a href="https://github.com/settings/tokens/new" target="_blank">Github documentation</a> on how to create one. Make sure to select one of the scopes - manage_billing:copilot, read:org, or read:enterprise.
    required: true
  - name: githubHost
    required: false
    type: url
    default: https://api.github.com
    description: The host of the Github api instance. If not specified, the default will be https://api.github.com.
  - name: githubEnterprise
    required: false
    type: string
    description: Optional enterprise slug used to fetch Copilot usage metrics from enterprise-level endpoints.
