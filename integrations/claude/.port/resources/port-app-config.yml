resources:
  - kind: claude-usage-record
    selector:
      query: .results | length > 0
      startingDate: '2026-01-01T00:00:00Z'
      bucketWidth: 1d
      groupBy: []
    port:
      entity:
        mappings:
          identifier: .starting_at[:10] + "-usage"
          title: '"Claude Usage - " + .starting_at[:10]'
          blueprint: '"claude_usage_record"'
          properties:
            record_date: .starting_at
            uncached_input_tokens: (.results[0].uncached_input_tokens // 0)
            output_tokens: (.results[0].output_tokens // 0)
            cache_read_input_tokens: (.results[0].cache_read_input_tokens // 0)
            cache_creation_5m_tokens: (.results[0].cache_creation.ephemeral_5m_input_tokens // 0)
            cache_creation_1h_tokens: (.results[0].cache_creation.ephemeral_1h_input_tokens // 0)
            web_search_requests: (.results[0].server_tool_use.web_search_requests // 0)
  - kind: claude-usage-record
    selector:
      query: .results | length > 0
      startingDate: '2026-01-01T00:00:00Z'
      bucketWidth: 1d
      groupBy:
        - model
    port:
      itemsToParse: .results
      itemsToParseTopLevelTransform: false
      entity:
        mappings:
          identifier: .item.model + "-" + .starting_at[:10]
          title: .item.model + " - " + .starting_at[:10]
          blueprint: '"claude_model_usage"'
          properties:
            record_date: .starting_at
            model: .item.model
            uncached_input_tokens: (.item.uncached_input_tokens // 0)
            output_tokens: (.item.output_tokens // 0)
            cache_read_input_tokens: (.item.cache_read_input_tokens // 0)
            cache_creation_5m_tokens: (.item.cache_creation.ephemeral_5m_input_tokens // 0)
            cache_creation_1h_tokens: (.item.cache_creation.ephemeral_1h_input_tokens // 0)
            web_search_requests: (.item.server_tool_use.web_search_requests // 0)
  - kind: claude-cost-record
    selector:
      query: .results | length > 0
      startingDate: '2026-01-01T00:00:00Z'
      bucketWidth: 1d
    port:
      entity:
        mappings:
          identifier: .starting_at[:10] + "-cost"
          title: '"Claude Cost - " + .starting_at[:10]'
          blueprint: '"claude_cost_record"'
          properties:
            record_date: .starting_at
            amount: ((.results[0].amount // "0") | tonumber)
            list_amount: ((.results[0].list_amount // "0") | tonumber)
            currency: (.results[0].currency // "USD")
  - kind: claude-user-activity
    selector:
      query: 'true'
      timeFrame: 30
    port:
      entity:
        mappings:
          identifier: .user.id + "-" + .__date
          title: (.user.email_address // .user.id) + " - " + .__date
          blueprint: '"claude_user_activity"'
          properties:
            date: .__date
            user_email: .user.email_address
            num_sessions: (.claude_code_metrics.core_metrics.distinct_session_count // 0)
            lines_added: (.claude_code_metrics.core_metrics.lines_of_code.added_count // 0)
            lines_removed: (.claude_code_metrics.core_metrics.lines_of_code.removed_count // 0)
            commits: (.claude_code_metrics.core_metrics.commit_count // 0)
            pull_requests: (.claude_code_metrics.core_metrics.pull_request_count // 0)
            edit_tool_accepted: (.claude_code_metrics.tool_actions.edit_tool.accepted // 0)
            edit_tool_rejected: (.claude_code_metrics.tool_actions.edit_tool.rejected // 0)
            write_tool_accepted: (.claude_code_metrics.tool_actions.write_tool.accepted // 0)
            write_tool_rejected: (.claude_code_metrics.tool_actions.write_tool.rejected // 0)
            message_count: (.chat_metrics.message_count // 0)
  - kind: claude-activity-summary
    selector:
      query: 'true'
      startingDate: '2026-01-01'
    port:
      entity:
        mappings:
          identifier: .starting_date
          title: '"Activity Summary " + .starting_date'
          blueprint: '"claude_activity_summary"'
          properties:
            starting_date: .starting_date
            ending_date: .ending_date
            daily_active_users: .daily_active_user_count
            weekly_active_users: .weekly_active_user_count
            monthly_active_users: .monthly_active_user_count
            total_seats: .assigned_seat_count
  - kind: claude-user-usage-report
    selector:
      query: 'true'
      startingDate: '2026-01-01T00:00:00Z'
      orderBy: total_tokens
    port:
      entity:
        mappings:
          identifier: .actor.user_id
          title: (.actor.name // .actor.email // .actor.user_id)
          blueprint: '"claude_user_usage_report"'
          properties:
            user_email: .actor.email
            uncached_input_tokens: (.uncached_input_tokens // 0)
            cache_read_input_tokens: (.cache_read_input_tokens // 0)
            cache_creation_tokens: ((.cache_creation.ephemeral_5m_input_tokens // 0) + (.cache_creation.ephemeral_1h_input_tokens // 0))
            output_tokens: (.output_tokens // 0)
            total_tokens: (.total_tokens // 0)
            web_search_requests: (.server_tool_use.web_search_requests // 0)
            request_count: (.requests // 0)
  - kind: claude-user-cost-report
    selector:
      query: 'true'
      startingDate: '2026-01-01T00:00:00Z'
      orderBy: amount
    port:
      entity:
        mappings:
          identifier: .actor.user_id
          title: (.actor.name // .actor.email // .actor.user_id)
          blueprint: '"claude_user_cost_report"'
          properties:
            user_email: .actor.email
            amount: ((.amount // "0") | tonumber)
            list_amount: ((.list_amount // "0") | tonumber)
