title: Claude
description: Claude integration for Port Ocean
icon: Claude
docs: https://docs.port.io/build-your-software-catalog/sync-data-to-catalog/ai-agents/claude
recommendedInstallationMethod: Saas
formMappingEnabled: true
features:
  - type: exporter
    section: AI Agents
    resources:
      - kind: claude-ai-user-activity
      - kind: claude-ai-user-usage
      - kind: claude-ai-user-cost
      - kind: claude-platform-usage-record
      - kind: claude-platform-cost-record
      - kind: claude-platform-code-analytics
saas:
  enabled: true
configurations:
  - name: isClaudeEnterprise
    type: boolean
    required: false
    default: true
    description: 'Whether this organization uses Claude AI (Enterprise). When enabled (the default), the integration syncs the per-user enterprise analytics endpoints (requires an admin key with the <code>read:analytics</code> scope). When disabled, it syncs the Claude Platform usage and cost reports (requires an admin key with the <code>api:admin</code> scope).'
  - name: anthropicApiKey
    type: string
    required: true
    sensitive: true
    description: The Anthropic admin API key used to authenticate with the Anthropic API. For Claude Enterprise it must carry the <code>read:analytics</code> scope; for Claude Platform it must carry the <code>api:admin</code> scope. Refer <a href="https://platform.claude.com/docs/en/api/overview#prerequisites" target="_blank">Anthropic documentation</a> on how to create one.
  - name: anthropicVersion
    type: string
    required: false
    sensitive: false
    default: "2023-06-01"
    description: The version of the Anthropic API to use. If not specified, the default will be "2023-06-01".
  - name: anthropicApiHost
    type: url
    required: false
    sensitive: false
    default: https://api.anthropic.com
    description: The host of the Anthropic api instance. If not specified, the default will be https://api.anthropic.com.
