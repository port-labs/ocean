title: Claude
description: Claude integration for Port Ocean
icon: Claude
docs: https://docs.port.io/build-your-software-catalog/sync-data-to-catalog/ai-agents/claude
recommendedInstallationMethod: Saas
formMappingEnabled: true
features:
  - type: exporter
    section: AI Agents
    resources:
      - kind: claude-usage-record
      - kind: claude-cost-record
      - kind: claude-user-activity
      - kind: claude-activity-summary
      - kind: claude-user-usage-report
      - kind: claude-user-cost-report
saas:
  enabled: true
configurations:
  - name: anthropicApiKey
    type: string
    required: true
    sensitive: true
    description: >
      The Anthropic analytics API key used to authenticate with the Enterprise Analytics API.
      Create one at <a href="https://claude.ai/analytics/api-keys" target="_blank">claude.ai/analytics/api-keys</a>
      (Primary Owner access required). The key must have the <code>read:analytics</code> scope.
  - name: anthropicApiHost
    type: url
    required: false
    sensitive: false
    default: https://api.anthropic.com
    description: The host of the Anthropic API instance. If not specified, the default will be https://api.anthropic.com.
