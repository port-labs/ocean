description: gitlab-v2 integration for Port Ocean
title: GitLab
icon: GitLab
formMappingEnabled: true
features:
  - type: exporter
    section: Git Providers
    resources:
      - kind: projects
      - kind: groups
      - kind: issues
      - kind: merge-request
      - kind: releases
      - kind: tags
      - kind: branch
configurations:
  - name: gitlabToken
    required: true
    type: string
    description: "The Gitlab token to authenticate with the Gitlab API."
    sensitive: true
  - name: gitlabHost
    required: false
    type: url
    default: https://gitlab.com
    description: The host of the Gitlab instance. If not specified, the default will be https://gitlab.com.
saas:
  enabled: true
  oauthConfiguration:
    requiredSecrets:
      - name: gitlabToken
        value: ".oauthData.accessToken"
        description: '"The Gitlab token to authenticate with the Gitlab API."'
    valuesOverride:
      integrationSpec:
        gitlabHost: '"https://gitlab.com"'
  liveEvents:
    enabled: true
  incrementalSync:
    enabled: true
actionsProcessingEnabled: true
actions:
  - name: trigger_pipeline
    icon: GitLab
    description: Trigger a GitLab CI/CD pipeline
    inputs:
      - name: project
        title: Project
        type: string
        description: GitLab project path (e.g., "my-group/my-project") or numeric ID
        required: true
      - name: ref
        title: Ref
        type: string
        description: Branch name, tag, or commit SHA to run the pipeline on
        required: true
      - name: reportPipelineStatus
        title: Report pipeline status
        type: boolean
        description: Whether to report pipeline completion status back to Port
        default: true
      - name: pipelineVariables
        title: Pipeline variables
        type: jqObject
        description: Key-value pairs passed as CI/CD variables to the pipeline
deploymentMethodOverride:
  - type: helm
