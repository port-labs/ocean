name: Check Port App Config Schema Breakage

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes-matrix.yml

  clear-schema-diff-comments:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - name: Clear Previous Schema Diff Comments
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${PR_NUMBER}" ]; then
            exit 0
          fi

          comment_ids=$(gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.type == "Bot" and (.body | contains("<!-- port-app-config-schema-diff:"))) | .id')

          for comment_id in ${comment_ids}; do
            gh api \
              --method DELETE \
              "repos/${REPOSITORY}/issues/comments/${comment_id}"
          done

  check-schema-diff:
    runs-on: ubuntu-latest
    needs: [detect-changes, clear-schema-diff-comments]
    if: ${{ needs.detect-changes.outputs.integrations != '[]' }}
    strategy:
      max-parallel: 5
      matrix:
        integration_folder: ${{ fromJson(needs.detect-changes.outputs.integrations) }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Check Schema Diff
        uses: ./.github/actions/check-schema-diff
        with:
          integration_folder: ${{ format('integrations/{0}', matrix.integration_folder) }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION }}
