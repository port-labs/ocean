name: Lint

on:
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes-matrix.yml
  lint:
    name: ${{ matrix.folder == '.' && '🌊 Ocean Core' || format('🚢 {0}', matrix.folder) }}
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        folder: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Install poetry
        run: pipx install 'poetry>=1.0.0,<2.0.0'

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        working-directory: ${{ matrix.folder != '.' && format('integrations/{0}', matrix.folder) || '.' }}
        run: |
          if [ "${{ matrix.folder }}" != "." ] && \
             ([ "${{ needs.detect-changes.outputs.core }}" = "true" ] || \
              [ "${{ needs.detect-changes.outputs.core_ci_files_changed }}" = "true" ]); then
            make install/local-core
          else
            make install
          fi

      - name: Lint
        working-directory: ${{ matrix.folder != '.' && format('integrations/{0}', matrix.folder) || '.' }}
        run: |
          make lint
