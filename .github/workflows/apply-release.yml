name: Apply release

on:
  workflow_run:
    workflows:
      - Release framework
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create_branch_and_open_pr:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3

      - name: Get package version
        id: version
        run: |
          version=$(pip index versions port-ocean | grep 'port-ocean' | cut -d' ' -f2 | tr -d '()')
          pr_name="[Integration] Apply Ocean version $version to all integrations"
          branch_name="apply-ocean-$version-to-all-integrations"
          echo "Branch Name: $branch_name"
          echo "PR Name: $pr_name"
          echo "pr_name=$pr_name" >> $GITHUB_OUTPUT
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Resolve GitHub actor
        id: github_actor
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "login=${{ github.actor }}" >> "$GITHUB_OUTPUT"
          else
            echo "login=${{ github.event.workflow_run.actor.login }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Port user from GitHub username
        id: port_user
        continue-on-error: true
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_MAIN_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_MAIN_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: SEARCH
          query: |
            {
              "combinator": "and",
              "rules": [
                {
                  "operator": "=",
                  "property": "$blueprint",
                  "value": "_user"
                },
                {
                  "operator": "=",
                  "property": "github_username",
                  "value": "${{ steps.github_actor.outputs.login }}"
                }
              ]
            }

      - name: Resolve Slack mention from Port user
        id: slack_mention
        if: ${{ steps.port_user.outputs.entities != '' && steps.port_user.outputs.entities != '[]' }}
        continue-on-error: true
        run: |
          slack_id='${{ fromJSON(steps.port_user.outputs.entities)[0].relations.slack_user_id }}'
          if [ -n "$slack_id" ] && [ "$slack_id" != "null" ]; then
            echo "text=<@${slack_id}>" >> "$GITHUB_OUTPUT"
          fi

      - name: Echo Slack mention tag (debug)
        run: |
          echo "GitHub actor: ${{ steps.github_actor.outputs.login }}"
          if [ -n "${{ steps.slack_mention.outputs.text }}" ]; then
            echo "Slack tag: ${{ steps.slack_mention.outputs.text }}"
          else
            echo "Slack tag: (not resolved)"
            echo "Port slack_user_id: ${{ steps.port_user.outputs.entities != '' && steps.port_user.outputs.entities != '[]' && fromJSON(steps.port_user.outputs.entities)[0].relations.slack_user_id || 'n/a' }}"
            echo "Fallback would be: <https://github.com/${{ steps.github_actor.outputs.login }}|${{ steps.github_actor.outputs.login }}>"
          fi

      - name: Apply changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          ./scripts/bump-all.sh ${{ steps.version.outputs.version }}

      - name: Open pull request
        id: open_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PORT_MACHINE_USER_GITHUB_TOKEN }}
          title: ${{ steps.version.outputs.pr_name }}
          branch: ${{ steps.version.outputs.branch_name }}
          base: main
          body: |
            This PR was automatically created by a GitHub Action.

            ## What does this PR do?
            Apply Ocean version ${{ steps.version.outputs.version }} to all integrations

            ## How should this be manually tested?
            ./scripts/bump-all.sh ^${{ steps.version.outputs.version }}

