name: Integration Tests

on:
  pull_request:
  workflow_dispatch:

# Default: least privilege. The test job adds checks:write for mikepenz/action-junit-report.
permissions:
  contents: read

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes-matrix.yml

  integration-test-matrix:
    name: Build integration test matrix
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Code-only change filter (skip doc/changelog-only PRs)
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          dir_names: true
          json: true
          dir_names_max_depth: 2
          escape_json: false
          files_yaml: |
            code_changes:
              - 'port_ocean/**'
              - 'integrations/**'
              - '.github/workflows/**'
              - '!**/*.md'
              - '!**/changelog/**'
              - '!**/CHANGELOG*'
              - '!**/README*'

      - name: Set integration test matrix
        id: set-matrix
        env:
          INTEGRATIONS_JSON: ${{ needs.detect-changes.outputs.integrations }}
          HAS_CORE: ${{ needs.detect-changes.outputs.core }}
          HAS_CORE_CI: ${{ needs.detect-changes.outputs.core_ci_files_changed }}
          CODE_CHANGES_FILES: ${{ steps.changed-files.outputs.code_changes_all_changed_files }}
        run: |
          HAS_CODE_CHANGES=false
          if [ -n "${CODE_CHANGES_FILES}" ] && [ "${CODE_CHANGES_FILES}" != "[]" ]; then HAS_CODE_CHANGES=true; fi

          if [ "${HAS_CODE_CHANGES}" != "true" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          INTEGRATIONS_WITH_TESTS=$(find integrations -name "integration_tests" -type d 2>/dev/null | while read -r d; do basename "$(dirname "$d")"; done | jq -R -s -c 'split("\n") | map(select(length > 0))')

          if [ "${HAS_CORE}" = "true" ] || [ "${HAS_CORE_CI}" = "true" ]; then
            echo "matrix=${INTEGRATIONS_WITH_TESTS}" >> $GITHUB_OUTPUT
          else
            CHANGED_SET=$(node -e "const changed = ${INTEGRATIONS_JSON}; console.log(JSON.stringify(changed))")
            WITH_TESTS_SET=$(node -e "const all = ${INTEGRATIONS_WITH_TESTS}; console.log(JSON.stringify(all))")
            INTERSECTION=$(node -e "const a = new Set(${CHANGED_SET}); const b = new Set(${WITH_TESTS_SET}); console.log(JSON.stringify([...a].filter(x => b.has(x))))")
            echo "matrix=${INTERSECTION}" >> $GITHUB_OUTPUT
          fi

  test:
    name: ${{ format('🧪 Integration Tests - {0}', matrix.folder) }}
    needs:
      - detect-changes
      - integration-test-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    if: ${{ needs.integration-test-matrix.outputs.matrix != '[]' }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.integration-test-matrix.outputs.matrix) }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Install poetry
        run: pipx install 'poetry>=1.0.0,<2.0.0'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        working-directory: ${{ format('integrations/{0}', matrix.folder) }}
        run: |
          if [ "${{ needs.detect-changes.outputs.core }}" = "true" ] || \
             [ "${{ needs.detect-changes.outputs.core_ci_files_changed }}" = "true" ]; then
            make install/local-core
          else
            make install
          fi

      - name: Run integration tests
        working-directory: ${{ format('integrations/{0}', matrix.folder) }}
        env:
          PYTEST_ADDOPTS: --junitxml=junit/integration-test-results-${{ matrix.folder }}.xml
        run: |
          mkdir -p /tmp/ocean/prometheus/metrics
          export PROMETHEUS_MULTIPROC_DIR=/tmp/ocean/prometheus/metrics
          make test/integration

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: ${{ always() }}
        with:
          report_paths: '**/junit/integration-test-results-*.xml'
          include_passed: true
          require_tests: true
          fail_on_failure: true
