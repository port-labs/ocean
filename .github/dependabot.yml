version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20

  - package-ecosystem: "pip"
    directory: "/"
    exclude-paths:
      - "port_ocean/cli/cookiecutter/**"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
